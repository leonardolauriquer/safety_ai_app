steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      # Usa a imagem :latest como cache para acelerar o build (multi-stage aproveitado)
      - '--cache-from=us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:${_TAG}'
      - '-t'
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'
      - '.'
    id: Build

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:${_TAG}'
    id: Push-SHA
    waitFor: ['Build']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'
    id: Push-Latest
    waitFor: ['Build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - safety-ai-app
      - '--image=us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:${_TAG}'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--min-instances=1'
      # Variáveis simples (texto)
      - '--set-env-vars=DISABLE_AUTOINDEX=1'
      # Segredos do Secret Manager (OAUTH_REDIRECT_URI como secret resolve o conflito de tipo)
      - >-
        --set-secrets=OAUTH_REDIRECT_URI=OAUTH_REDIRECT_URI:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,GOOGLE_SERVICE_ACCOUNT_KEY=GOOGLE_SERVICE_ACCOUNT_KEY:latest,GOOGLE_CLIENT_CREDENTIALS=GOOGLE_CLIENT_CREDENTIALS:latest,GOOGLE_DRIVE_CENTRAL_LIBRARY_FOLDER_ID=GOOGLE_DRIVE_CENTRAL_LIBRARY_FOLDER_ID:latest,GOOGLE_DRIVE_DONATION_FOLDER_ID=GOOGLE_DRIVE_DONATION_FOLDER_ID:latest,ADZUNA_API_KEY=ADZUNA_API_KEY:latest,ADZUNA_APP_ID=ADZUNA_APP_ID:latest,ICD_API_CLIENT_ID=ICD_API_CLIENT_ID:latest,ICD_API_CLIENT_SECRET=ICD_API_CLIENT_SECRET:latest,RECAPTCHA_SECRET_KEY=RECAPTCHA_SECRET_KEY:latest,RECAPTCHA_SITE_KEY=RECAPTCHA_SITE_KEY:latest,ADMIN_EMAILS=ADMIN_EMAILS:latest
      - '--project=safetyai-472110'
    id: Deploy-CloudRun
    waitFor: ['Push-SHA']

images:
  - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:${_TAG}'
  - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
