steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'
      - '.'
    id: Build

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:$COMMIT_SHA'
    id: Push-SHA
    waitFor: ['Build']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'
    id: Push-Latest
    waitFor: ['Build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - safety-ai-app
      - '--image=us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--set-env-vars=DISABLE_AUTOINDEX=1'
      - '--project=safetyai-472110'
    id: Deploy-CloudRun
    waitFor: ['Push-SHA']

images:
  - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
