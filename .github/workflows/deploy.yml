name: Deploy to Cloud Run + Firebase

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: safetyai-472110
  FIREBASE_PROJECT: safety-ai-2026
  REGION: us-central1
  SERVICE_NAME: safety-ai-app
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/safetyai-472110/safety-ai-app/safety-ai-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8080 --memory=4Gi --cpu=2 --timeout=300 \
            --set-env-vars="DISABLE_AUTOINDEX=1" \
            --project=${{ env.PROJECT_ID }}
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project ${{ env.FIREBASE_PROJECT }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
