name: Security Audit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 7 * * 1"

jobs:
  pip-audit:
    name: pip-audit dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r safety_ai_app/requirements.txt

      - name: Run pip-audit
        run: pip-audit --local --format columns
